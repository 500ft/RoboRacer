gym_bridge_node:
  ros__parameters:
    drive_topic: /drive
    odom_topic: /ego_racecar/odom
    internal_state_topic: /f1tenth/internal_state
    collision_topic: /f1tenth/collision
    timestep_s: 0.01
    use_open_map: true
    open_map_dir: runs/ros2_sysid_steering_excitation
    map_path: examples/example_map
    map_ext: .png
    start_x: 0.7
    start_y: 0.0
    start_theta: 1.37079632679

sysid_excitation_node:
  ros__parameters:
    drive_topic: /drive
    internal_state_topic: /f1tenth/internal_state
    collision_topic: /f1tenth/collision
    output_dir: runs/ros2_sysid_steering_excitation
    timestep_s: 0.01
    target_speed_mps: 2.0
    amplitude_rad: 0.04
    duration_s: 20.0
    freq_start_hz: 0.2
    freq_end_hz: 2.0
    s_max_rad: 0.4189
    steering_saturation_fraction_limit: 0.02
    steering_saturation_segment_limit_s: 0.25
