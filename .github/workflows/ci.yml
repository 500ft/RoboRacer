name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:

    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.8", "3.9"]

    steps:
    - uses: actions/checkout@v2
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v2
      with:
        python-version: ${{ matrix.python-version }}
        
    - name: Install
      run: |
        python -m pip install --upgrade pip
        pip install -e .

    - name: Install test dependencies
      run: |
        pip install pandas "rosbags==0.11.3"

    - name: Run rosbag conversion tests
      run: |
        python experiments/test_rosbag_to_telemetry.py
        python experiments/test_bag_evidence.py
        python experiments/validate_item11.py

  item11-regression:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2
    - name: Build pinned item 11 regression image
      run: docker build -f Dockerfile.item11-regression -t item11-regression .
    - name: Run strict item 11 regression
      run: docker run --rm item11-regression
